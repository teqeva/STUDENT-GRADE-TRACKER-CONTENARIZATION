services:
  frontend:
    image: teqiee/student-grade-tracker-frontend:1.0.0
    container_name: student-grade-tracker-frontend
    ports:
      - "8080:80"
    networks:
      - grade-tracker-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: teqiee/student-grade-tracker-backend:1.0.0
    container_name: student-grade-tracker-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-grades_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT:-3000}
    networks:
      - grade-tracker-network
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  database:
    image: postgres:15-alpine
    container_name: student-grade-tracker-database
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-grades_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - grade-tracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grades_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

networks:
  grade-tracker-network:
    driver: bridge
    name: grade-tracker-network

volumes:
  postgres-data:
    driver: local
